<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Online - Little Kitchen Westport</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4AF37;
            --dark-red: #8B0000;
            --bg-dark: #0F0F0F;
            --card-bg: #1A1A1A;
            --text-light: #F5F5F5;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-dark); color: var(--text-light); display: flex; min-height: 100vh; }

        /* Sidebar */
        .sidebar { width: 300px; height: 100vh; background: #000; padding: 2rem; position: sticky; top: 0; border-right: 1px solid var(--glass); display: flex; flex-direction: column; }
        .sidebar h2 { font-family: 'Playfair Display', serif; color: var(--gold); margin-bottom: 2rem; cursor: pointer; }
        .cat-link { display: block; padding: 1rem; color: #888; text-decoration: none; border-radius: 8px; margin-bottom: 0.5rem; transition: 0.3s; }
        .cat-link:hover, .cat-link.active { background: var(--glass); color: white; }

        .cart-summary { margin-top: auto; padding-top: 2rem; border-top: 1px solid var(--glass); }
        .cart-total { display: flex; justify-content: space-between; font-weight: 600; margin-bottom: 1rem; }
        .checkout-btn { width: 100%; background: var(--dark-red); color: white; border: none; padding: 1rem; border-radius: 4px; font-weight: 700; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
        .checkout-btn:hover { background: #a50000; }

        /* Main Content */
        .menu-container { flex: 1; padding: 3rem; overflow-y: auto; }
        .menu-section { margin-bottom: 4rem; }
        .menu-section h3 { font-family: 'Playfair Display', serif; font-size: 2rem; margin-bottom: 2rem; color: var(--gold); border-bottom: 1px solid var(--glass); padding-bottom: 0.5rem; }

        .items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 2rem; }
        .item-card { background: var(--card-bg); border-radius: 12px; border: 1px solid var(--glass); overflow: hidden; transition: 0.3s; display: flex; flex-direction: column; }
        .item-card:hover { transform: translateY(-5px); border-color: var(--gold); }
        .item-img { height: 200px; background-size: cover; background-position: center; position: relative; }
        .item-price-tag { position: absolute; top: 1rem; right: 1rem; background: rgba(0,0,0,0.8); padding: 0.5rem 1rem; border-radius: 20px; font-weight: 600; color: var(--gold); }
        .item-body { padding: 1.5rem; flex: 1; display: flex; flex-direction: column; }
        .item-name { font-family: 'Playfair Display', serif; font-size: 1.25rem; margin-bottom: 0.5rem; }
        .item-desc { color: #aaa; font-size: 0.9rem; margin-bottom: 1.5rem; flex: 1; }
        .add-btn { background: var(--glass); color: white; border: 1px solid var(--gold); padding: 0.75rem; border-radius: 6px; cursor: pointer; transition: 0.3s; font-weight: 600; }
        .add-btn:hover { background: var(--gold); color: black; }

        /* Notification */
        .notif { position: fixed; bottom: 2rem; right: 2rem; background: #222; border: 1px solid var(--gold); padding: 1rem 2rem; border-radius: 8px; transform: translateY(150%); transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); z-index: 2000; }
        .notif.show { transform: translateY(0); }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: auto; position: static; border-right: none; border-bottom: 1px solid var(--glass); }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2 onclick="location.href='index.html'">LITTLE KITCHEN</h2>
        <a href="#apps" class="cat-link active">Appetizers</a>
        <a href="#thai" class="cat-link">Thai Classics</a>
        <a href="#sushi" class="cat-link">Sushi Rolls</a>
        <a href="#curry" class="cat-link">Curries</a>

        <div class="cart-summary">
            <div class="form-group" style="margin-bottom: 1.5rem;">
                <label style="display:block; font-size: 0.8rem; color: #888; margin-bottom: 0.5rem;">YOUR NAME</label>
                <input type="text" id="custName" placeholder="For the order..." style="width: 100%; background: #111; border: 1px solid #333; color: white; padding: 0.8rem; border-radius: 4px; outline: none;">
            </div>
            <div class="cart-total">
                <span>Items: <span id="cart-count">0</span></span>
                <span>Total: $<span id="cart-total">0.00</span></span>
            </div>
            <button class="checkout-btn" onclick="checkout()">Complete Order</button>
        </div>
    </div>

    <div class="menu-container">
        <section class="menu-section" id="apps">
            <h3>Appetizers</h3>
            <div class="items-grid" id="apps-grid"></div>
        </section>

        <section class="menu-section" id="thai">
            <h3>Thai Classics</h3>
            <div class="items-grid" id="thai-grid"></div>
        </section>

        <section class="menu-section" id="sushi">
            <h3>Signature Sushi</h3>
            <div class="items-grid" id="sushi-grid"></div>
        </section>

        <section class="menu-section" id="curry">
            <h3>Curries</h3>
            <div class="items-grid" id="curry-grid"></div>
        </section>
    </div>

    <div class="notif" id="notif">Item added to your order!</div>

        let cart = JSON.parse(localStorage.getItem('lk_cart')) || [];
        updateUI();

        function renderMenu() {
            for (let cat in menuData) {
                const grid = document.getElementById(`${cat}-grid`);
                if (!grid) continue;
                menuData[cat].forEach(item => {
                    grid.innerHTML += `
                        <div class="item-card">
                            <div class="item-img" style="background-image: url('${item.img}')">
                                <div class="item-price-tag">$${item.price.toFixed(2)}</div>
                            </div>
                            <div class="item-body">
                                <div class="item-name">${item.name}</div>
                                <div class="item-desc">${item.desc}</div>
                                <button class="add-btn" onclick="addToCart('${item.name}', ${item.price})">Add to Order</button>
                            </div>
                        </div>
                    `;
                });
            }
        }

        function addToCart(name, price) {
            cart.push({ name, price, id: Date.now() });
            localStorage.setItem('lk_cart', JSON.stringify(cart));
            updateUI();
            showNotif(name + ' added!');
        }

        function updateUI() {
            document.getElementById('cart-count').innerText = cart.length;
            const total = cart.reduce((sum, item) => sum + item.price, 0);
            document.getElementById('cart-total').innerText = total.toFixed(2);
        }

        function showNotif(msg) {
            const n = document.getElementById('notif');
            n.innerText = msg;
            n.classList.add('show');
            setTimeout(() => n.classList.remove('show'), 2000);
        }

        function checkout() {
            const name = document.getElementById('custName').value.trim();
            if (!name) return alert('Please enter your name for the order.');
            if (cart.length === 0) return alert('Your cart is empty!');

            const orders = JSON.parse(localStorage.getItem('lk_orders')) || [];
            const newOrder = {
                id: 'ORD-' + Math.random().toString(36).substr(2, 9).toUpperCase(),
                customer: name,
                items: cart,
                total: cart.reduce((sum, item) => sum + item.price, 0),
                time: new Date().toLocaleString(),
                status: 'Pending'
            };
            orders.push(newOrder);
            localStorage.setItem('lk_orders', JSON.stringify(orders));
            localStorage.removeItem('lk_cart');
            cart = [];
            updateUI();
            document.getElementById('custName').value = '';
            showNotif('Order placed successfully!');
            setTimeout(() => location.href = 'index.html', 1500);
        }

        // Smooth scroll for categories
        document.querySelectorAll('.cat-link').forEach(link => {
            link.onclick = (e) => {
                e.preventDefault();
                document.querySelectorAll('.cat-link').forEach(l => l.classList.remove('active'));
                link.classList.add('active');
                const target = document.querySelector(link.getAttribute('href'));
                target.scrollIntoView({ behavior: 'smooth' });
            };
        });

        renderMenu();
    </script>
